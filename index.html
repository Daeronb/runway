<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Runway — Residency Matrix</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0b1220">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="stylesheet" href="./app.css">
</head>
<body>
<header>
  <div class="brand">🛫 Runway <span class="sub">Residency Matrix</span></div>
  <button id="menuBtn" class="iconbtn" aria-label="Menu">☰</button>
</header>
<main>
  <section id="view-today"></section>
  <section id="view-trips" hidden></section>
  <section id="view-map" hidden></section>
  <section id="view-countries" hidden></section>
  <section id="view-plan" hidden></section>
</main>
<nav id="tabbar">
  <button data-view="today" class="on">📍<span>Today</span></button>
  <button data-view="trips">🧳<span>Trips</span></button>
  <button data-view="map">🗺️<span>Map</span></button>
  <button data-view="countries">📜<span>Rules</span></button>
  <button data-view="plan">🔮<span>Plan</span></button>
</nav>
<button id="fab" hidden>＋</button>
<div id="sheetWrap" hidden><div id="sheetBg"></div><div id="sheet"></div></div>
<div id="toast" hidden></div>
<input type="file" id="importFile" accept=".json,application/json" hidden>
<script src="./rules.js"></script>
<script src="./app.js"></script>
</body>
</html>
